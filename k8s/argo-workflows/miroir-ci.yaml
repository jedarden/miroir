apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: miroir-ci
  namespace: argo-workflows
  labels:
    app: miroir-ci
spec:
  entrypoint: pipeline
  serviceAccountName: argo-workflow-executor
  arguments:
    parameters:
      - name: repo
        value: https://github.com/jedarden/miroir.git
      - name: revision
        value: main
      - name: tag
        value: ""
  volumeClaimTemplates:
    - metadata:
        name: workspace
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 8Gi
  volumes:
    - name: ghcr-config
      secret:
        secretName: ghcr-jedarden-registry
        items:
          - key: .dockerconfigjson
            path: config.json
  templates:
    - name: pipeline
      dag:
        tasks:
          - name: checkout
            template: git-checkout
          - name: lint
            template: cargo-lint
            dependencies: [checkout]
          - name: test
            template: cargo-test
            dependencies: [checkout]
          - name: coverage
            template: cargo-tarpaulin
            dependencies: [test]
          - name: bench-check
            template: cargo-bench-check
            dependencies: [test]
          - name: build
            template: cargo-build
            dependencies: [lint, bench-check]
          - name: docker
            template: docker-build-push
            dependencies: [build]
            when: "'{{workflow.parameters.tag}}' != ''"
          - name: release
            template: create-github-release
            dependencies: [build]
            when: "'{{workflow.parameters.tag}}' != ''"
          - name: helm-package
            template: helm-package
            dependencies: [checkout]
            when: "'{{workflow.parameters.tag}}' != ''"
          - name: helm-publish-ghpages
            template: helm-publish-ghpages
            dependencies: [helm-package]
            when: "'{{workflow.parameters.tag}}' != ''"
          - name: helm-publish-oci
            template: helm-publish-oci
            dependencies: [helm-package]
            when: "'{{workflow.parameters.tag}}' != ''"

    - name: git-checkout
      activeDeadlineSeconds: 300
      container:
        image: alpine/git:2.43.0
        command: [sh, -c]
        args:
          - |
            set -e
            REPO="{{workflow.parameters.repo}}"
            REPO_PATH="${REPO#https://}"
            git clone --depth 1 --branch "{{workflow.parameters.revision}}" \
              "https://x-access-token:${GH_TOKEN}@${REPO_PATH}" /workspace/src
        env:
          - name: GH_TOKEN
            valueFrom:
              secretKeyRef:
                name: github-webhook-secret
                key: token
        volumeMounts:
          - name: workspace
            mountPath: /workspace
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi

    - name: cargo-lint
      activeDeadlineSeconds: 900
      container:
        image: rust:1.87-slim
        command: [bash, -c]
        args:
          - |
            set -e
            apt-get update -qq && apt-get install -y -qq pkg-config libssl-dev >/dev/null 2>&1
            cd /workspace/src
            export CARGO_TARGET_DIR=/workspace/target-lint
            cargo fmt --all -- --check
            cargo clippy --all-targets -- -D warnings
        volumeMounts:
          - name: workspace
            mountPath: /workspace
        resources:
          requests:
            cpu: 1000m
            memory: 2Gi
          limits:
            cpu: 2000m
            memory: 4Gi

    - name: cargo-test
      activeDeadlineSeconds: 900
      container:
        image: rust:1.87-slim
        command: [bash, -c]
        args:
          - |
            set -e
            apt-get update -qq && apt-get install -y -qq pkg-config libssl-dev >/dev/null 2>&1
            cd /workspace/src
            export CARGO_TARGET_DIR=/workspace/target-test
            cargo test --all --all-features
        volumeMounts:
          - name: workspace
            mountPath: /workspace
        resources:
          requests:
            cpu: 2000m
            memory: 4Gi
          limits:
            cpu: 4000m
            memory: 8Gi

    - name: cargo-tarpaulin
      activeDeadlineSeconds: 1800
      container:
        image: rust:1.87-slim
        command: [bash, -c]
        args:
          - |
            set -e
            apt-get update -qq && apt-get install -y -qq pkg-config libssl-dev curl >/dev/null 2>&1

            # Install cargo-tarpaulin
            curl -LsSf https://get.cargo-tarpaulin.app | cargo install --root /usr/local

            cd /workspace/src
            export CARGO_TARGET_DIR=/workspace/target-coverage

            # Run tarpaulin with HTML and XML output (plan §8 coverage policy)
            # Exclude miroir-proxy and miroir-ctl (I/O-heavy, integration-tested instead)
            cargo tarpaulin --workspace \
              --exclude-files 'crates/miroir-proxy/*' 'crates/miroir-ctl/*' \
              --out Html --out Xml \
              --output-dir /workspace/coverage \
              --timeout 600 \
              --fail-under 90.0

            # Generate coverage summary for CI logs
            echo "=== Coverage summary ==="
            if [ -f /workspace/coverage/cobertura.xml ]; then
              # Parse XML to show percentage
              python3 << 'EOF'
import xml.etree.ElementTree as ET
tree = ET.parse('/workspace/coverage/cobertura.xml')
root = tree.getroot()
coverage = root.attrib.get('line-rate', '0')
percent = float(coverage) * 100
print(f"miroir-core coverage: {percent:.2f}%")
if percent < 90.0:
    print(f"ERROR: Coverage {percent:.2f}% is below 90% threshold")
    exit(1)
print("Coverage gate: PASSED")
EOF
            fi

            echo "=== Coverage reports generated ==="
            ls -la /workspace/coverage/
        volumeMounts:
          - name: workspace
            mountPath: /workspace
        resources:
          requests:
            cpu: 4000m
            memory: 8Gi
          limits:
            cpu: 6000m
            memory: 12Gi
        outputs:
          artifacts:
            - name: coverage-html
              path: /workspace/coverage/tarpaulin-report.html
            - name: coverage-xml
              path: /workspace/coverage/cobertura.xml

    - name: cargo-bench-check
      activeDeadlineSeconds: 600
      container:
        image: rust:1.87-slim
        command: [bash, -c]
        args:
          - |
            set -e
            apt-get update -qq && apt-get install -y -qq pkg-config libssl-dev >/dev/null 2>&1
            cd /workspace/src
            export CARGO_TARGET_DIR=/workspace/target-bench

            # Phase 8: Run performance benchmarks (plan §8)
            # Run with short sample size for CI; full benchmarks run in nightly
            cargo bench -p miroir-core \
              --bench router_bench \
              --bench merger_bench \
              -- --sample-size 10 --warm-up-time 1 --measurement-time 3 \
              --save-baseline main

            # Copy benchmark results to workspace
            mkdir -p /workspace/dist/bench
            cp -r /workspace/target-bench/criterion /workspace/dist/bench/

            echo "=== Benchmark results ==="
            ls -la /workspace/dist/bench/criterion/
        volumeMounts:
          - name: workspace
            mountPath: /workspace
        resources:
          requests:
            cpu: 2000m
            memory: 4Gi
          limits:
            cpu: 4000m
            memory: 8Gi
        outputs:
          artifacts:
            - name: benchmark-results
              path: /workspace/dist/bench

    - name: cargo-build
      activeDeadlineSeconds: 1800
      container:
        image: rust:1.87-slim
        command: [bash, -c]
        args:
          - |
            set -e
            apt-get update -qq && apt-get install -y -qq pkg-config libssl-dev musl-tools >/dev/null 2>&1
            cd /workspace/src
            rustup target add x86_64-unknown-linux-musl

            cargo build --release --target x86_64-unknown-linux-musl \
              --features miroir-core/kafka-sink \
              -p miroir-proxy -p miroir-ctl

            mkdir -p /workspace/dist
            cp target/x86_64-unknown-linux-musl/release/miroir-proxy \
              /workspace/dist/miroir-proxy-linux-amd64
            cp target/x86_64-unknown-linux-musl/release/miroir-ctl \
              /workspace/dist/miroir-ctl-linux-amd64

            sha256sum /workspace/dist/miroir-proxy-linux-amd64 \
              > /workspace/dist/miroir-proxy-linux-amd64.sha256
            sha256sum /workspace/dist/miroir-ctl-linux-amd64 \
              > /workspace/dist/miroir-ctl-linux-amd64.sha256

            # Copy proxy binary to source dir for docker context (Dockerfile expects it there)
            cp /workspace/dist/miroir-proxy-linux-amd64 \
              /workspace/src/miroir-proxy-linux-amd64

            echo "=== build checksums ==="
            cat /workspace/dist/miroir-proxy-linux-amd64.sha256
            cat /workspace/dist/miroir-ctl-linux-amd64.sha256
        volumeMounts:
          - name: workspace
            mountPath: /workspace
        resources:
          requests:
            cpu: 4000m
            memory: 8Gi
          limits:
            cpu: 4000m
            memory: 8Gi

    - name: docker-build-push
      activeDeadlineSeconds: 1800
      container:
        image: gcr.io/kaniko-project/executor:v1.23.0-debug
        command: [/busybox/sh, -c]
        args:
          - |
            set -e
            TAG="{{workflow.parameters.tag}}"
            REGISTRY="ghcr.io/jedarden/miroir"
            VERSION="${TAG#v}"

            DESTS="--destination=${REGISTRY}:${TAG}"

            # Stable release (vX.Y.Z): also push float tags and :latest
            # Pre-release (vX.Y.Z-rc.N) and branch builds: exact tag only
            if echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
              MINOR=$(echo "$TAG" | sed 's/^v\([0-9]*\.[0-9]*\)\..*/\1/')
              MAJOR=$(echo "$TAG" | sed 's/^v\([0-9]*\)\..*/\1/')
              DESTS="${DESTS} --destination=${REGISTRY}:${MINOR}"
              DESTS="${DESTS} --destination=${REGISTRY}:${MAJOR}"
              DESTS="${DESTS} --destination=${REGISTRY}:latest"
            fi

            /kaniko/executor \
              --dockerfile=/workspace/src/Dockerfile \
              --context=/workspace/src \
              --build-arg=VERSION=${VERSION} \
              --build-arg=REVISION={{workflow.parameters.revision}} \
              $DESTS \
              --cache=true \
              --cache-repo=${REGISTRY}/cache \
              --snapshot-mode=redo \
              --use-new-run=true
        volumeMounts:
          - name: workspace
            mountPath: /workspace
          - name: ghcr-config
            mountPath: /kaniko/.docker
        resources:
          requests:
            cpu: 2000m
            memory: 4Gi
          limits:
            cpu: 4000m
            memory: 8Gi

    - name: create-github-release
      activeDeadlineSeconds: 600
      container:
        image: ghcr.io/cli/cli:2.49.0
        command: [sh, -c]
        args:
          - |
            set -e
            TAG="{{workflow.parameters.tag}}"
            VER="${TAG#v}"

            # Extract release notes from CHANGELOG.md for this version
            NOTES=$(awk -v ver="$VER" '
              found && /^## \[/ { exit }
              $0 ~ ("^## \\[" ver "\\]") { found=1; next }
              found { print }
            ' /workspace/src/CHANGELOG.md)

            if [ -z "$NOTES" ]; then
              NOTES="Release ${TAG}"
            fi

            # Skip if release already exists
            if gh release view "${TAG}" --repo jedarden/miroir >/dev/null 2>&1; then
              echo "Release ${TAG} already exists, skipping."
              exit 0
            fi

            # Pre-release detection: tags like vX.Y.Z-rc.N, vX.Y.Z-beta.1, etc.
            PRERELEASE_FLAG=""
            if echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+[-+]'; then
              PRERELEASE_FLAG="--prerelease"
            fi

            gh release create "${TAG}" \
              --repo jedarden/miroir \
              --title "miroir ${TAG}" \
              --notes "${NOTES}" \
              ${PRERELEASE_FLAG} \
              --target "{{workflow.parameters.revision}}" \
              /workspace/dist/miroir-proxy-linux-amd64 \
              /workspace/dist/miroir-proxy-linux-amd64.sha256 \
              /workspace/dist/miroir-ctl-linux-amd64 \
              /workspace/dist/miroir-ctl-linux-amd64.sha256

            echo "Release ${TAG} created successfully."
        env:
          - name: GH_TOKEN
            valueFrom:
              secretKeyRef:
                name: github-webhook-secret
                key: token
        volumeMounts:
          - name: workspace
            mountPath: /workspace
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi

    - name: helm-package
      activeDeadlineSeconds: 300
      container:
        image: alpine/helm:3.14.0
        command: [sh, -c]
        args:
          - |
            set -e
            apk add --no-cache yq

            TAG="{{workflow.parameters.tag}}"
            VERSION="${TAG#v}"

            # Extract chart version from Chart.yaml and update it
            CHART_YAML="/workspace/src/charts/miroir/Chart.yaml"

            # For chart-only changes, we'd bump only chart version here
            # For now, chart version tracks app version
            yq -i ".version = \"$VERSION\"" "$CHART_YAML"
            yq -i ".appVersion = \"$VERSION\"" "$CHART_YAML"

            # Package the chart
            mkdir -p /workspace/dist
            helm package /workspace/src/charts/miroir -d /workspace/dist

            echo "=== Helm chart packaged ==="
            ls -la /workspace/dist/miroir-*.tgz
        volumeMounts:
          - name: workspace
            mountPath: /workspace
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi

    - name: helm-publish-ghpages
      activeDeadlineSeconds: 600
      container:
        image: alpine/helm:3.14.0
        command: [sh, -c]
        args:
          - |
            set -e
            apk add --no-cache git

            TAG="{{workflow.parameters.tag}}"

            # Set up git config for gh-pages push
            git config --global user.name "miroir-ci"
            git config --global user.email "ci@ardenone.com"

            # Clone or create gh-pages branch
            if git ls-remote --exit-code --heads "https://x-access-token:${GH_TOKEN}@github.com/jedarden/miroir.git" gh-pages >/dev/null 2>&1; then
              git clone --depth 1 --branch gh-pages \
                "https://x-access-token:${GH_TOKEN}@github.com/jedarden/miroir.git" \
                /workspace/gh-pages
            else
              # Create initial gh-pages branch
              git clone "https://x-access-token:${GH_TOKEN}@github.com/jedarden/miroir.git" /workspace/gh-pages
              cd /workspace/gh-pages
              git checkout --orphan gh-pages
              git rm -rf .
              git commit -m "Initialize gh-pages branch" --allow-empty
              git push origin gh-pages
            fi

            # Copy new chart package
            cp /workspace/dist/miroir-*.tgz /workspace/gh-pages/

            # Generate/update index.yaml
            cd /workspace/gh-pages
            helm repo index . --url https://jedarden.github.io/miroir

            # Commit and push
            git add -A
            git commit -m "Release chart ${TAG}" || echo "No changes to commit"
            git push origin gh-pages

            echo "=== Chart published to gh-pages ==="
            echo "Repository: https://jedarden.github.io/miroir"
        env:
          - name: GH_TOKEN
            valueFrom:
              secretKeyRef:
                name: github-webhook-secret
                key: token
        volumeMounts:
          - name: workspace
            mountPath: /workspace
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi

    - name: helm-publish-oci
      activeDeadlineSeconds: 600
      container:
        image: alpine/helm:3.14.0
        command: [sh, -c]
        args:
          - |
            set -e
            apk add --no-cache jq

            # Parse Docker config JSON for GHCR auth
            # The ghcr-jedarden-registry secret uses Docker config JSON format
            DOCKER_CONFIG="/kaniko/.docker/config.json"
            AUTH=$(jq -r '.auths."ghcr.io".auth' "$DOCKER_CONFIG")
            if [ "$AUTH" = "null" ]; then
              echo "Error: GHCR auth not found in Docker config"
              exit 1
            fi

            # Decode base64 auth (username:password format)
            CREDS=$(echo "$AUTH" | base64 -d)
            USERNAME=$(echo "$CREDS" | cut -d: -f1)
            PASSWORD=$(echo "$CREDS" | cut -d: -f2)

            # Login to GHCR
            echo "$PASSWORD" | helm registry login ghcr.io \
              --username "$USERNAME" \
              --password-stdin

            # Push chart to OCI registry
            CHART_FILE=$(ls /workspace/dist/miroir-*.tgz | head -1)
            helm push "${CHART_FILE}" oci://ghcr.io/jedarden/charts

            echo "=== Chart published to OCI ==="
            echo "Repository: oci://ghcr.io/jedarden/charts/miroir"
        volumeMounts:
          - name: workspace
            mountPath: /workspace
          - name: ghcr-config
            mountPath: /kaniko/.docker
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
