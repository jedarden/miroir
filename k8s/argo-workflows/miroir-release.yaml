---
# WorkflowTemplate: miroir-release
# Triggered by tags matching v[0-9]+.[0-9]+.[0-9]+* via Argo Events sensor.
# Produces: GitHub release, ghcr.io image (with tags), Helm chart on gh-pages + OCI.
# Pre-release tags (containing '-') skip :latest and float tags.
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: miroir-release
  namespace: argo-workflows
  annotations:
    workflows.argoproj.io/description: "Build and publish a miroir release from a semver tag"
spec:
  entrypoint: release-pipeline
  serviceAccountName: argo-workflow
  arguments:
    parameters:
      - name: tag
        value: ""
  volumeClaimTemplates:
    - metadata:
        name: workspace
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 6G

  templates:

    # ------------------------------------------------------------------ #
    # Top-level pipeline
    # ------------------------------------------------------------------ #
    - name: release-pipeline
      steps:
        - - name: check-release-ready
            template: release-ready
            arguments:
              parameters:
                - name: tag
                  value: "{{workflow.parameters.tag}}"

        - - name: build-binaries
            template: build-binaries
            arguments:
              parameters:
                - name: tag
                  value: "{{workflow.parameters.tag}}"

        - - name: build
            template: build-image
            arguments:
              parameters:
                - name: tag
                  value: "{{workflow.parameters.tag}}"

        - - name: publish-chart
            template: helm-publish
            arguments:
              parameters:
                - name: tag
                  value: "{{workflow.parameters.tag}}"

        - - name: github-release
            template: create-github-release
            arguments:
              parameters:
                - name: tag
                  value: "{{workflow.parameters.tag}}"

    # ------------------------------------------------------------------ #
    # 1. Release-ready gate
    # ------------------------------------------------------------------ #
    - name: release-ready
      inputs:
        parameters:
          - name: tag
      container:
        image: alpine/git:latest
        command: [sh, -c]
        args:
          - |
            set -e
            git clone https://github.com/jedarden/miroir.git /src
            cd /src
            git checkout "{{inputs.parameters.tag}}"
            sh scripts/release-ready-check.sh "{{inputs.parameters.tag}}"

    # ------------------------------------------------------------------ #
    # 2. Build Rust binaries (needed for Docker image context)
    # ------------------------------------------------------------------ #
    - name: build-binaries
      inputs:
        parameters:
          - name: tag
      container:
        image: rust:1.87-slim
        command: [sh, -c]
        args:
          - |
            set -e
            TAG="{{inputs.parameters.tag}}"

            # Clone the repo at the tag to workspace for sharing with later steps
            git clone --depth 1 --branch "$TAG" https://github.com/jedarden/miroir.git /workspace/src
            cd /workspace/src

            # Install musl target
            apt-get update -qq && apt-get install -y -qq pkg-config libssl-dev musl-tools >/dev/null 2>&1
            rustup target add x86_64-unknown-linux-musl

            # Build the binaries
            cargo build --release --target x86_64-unknown-linux-musl \
              --features miroir-core/kafka-sink \
              -p miroir-proxy -p miroir-ctl

            # Copy binaries to source dir for Docker context
            cp target/x86_64-unknown-linux-musl/release/miroir-proxy \
              /workspace/src/miroir-proxy-linux-amd64
            cp target/x86_64-unknown-linux-musl/release/miroir-ctl \
              /workspace/src/miroir-ctl-linux-amd64

            sha256sum /workspace/src/miroir-proxy-linux-amd64 > /workspace/src/miroir-proxy-linux-amd64.sha256
            sha256sum /workspace/src/miroir-ctl-linux-amd64 > /workspace/src/miroir-ctl-linux-amd64.sha256

            echo "=== Binaries built successfully ==="
            ls -la /workspace/src/miroir-*linux-amd64*
        volumeMounts:
          - name: workspace
            mountPath: /workspace

    # ------------------------------------------------------------------ #
    # 3. Build Docker image and push
    # ------------------------------------------------------------------ #
    - name: build-image
      inputs:
        parameters:
          - name: tag
      volumes:
        - name: docker-config
          secret:
            secretName: ghcr-jedarden-registry
            items:
              - key: .dockerconfigjson
                path: config.json
      container:
        image: gcr.io/kaniko-project/executor:v1.23.0-debug
        command: [/busybox/sh, -c]
        args:
          - |
            set -e
            TAG="{{inputs.parameters.tag}}"
            REGISTRY="ghcr.io/jedarden/miroir"
            VERSION="${TAG#v}"

            DESTS="--destination=${REGISTRY}:${TAG}"

            # Float tags only for stable releases (no '-' in version suffix)
            if echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
              MINOR=$(echo "$TAG" | sed 's/^v\([0-9]*\.[0-9]*\)\..*/\1/')
              MAJOR=$(echo "$TAG" | sed 's/^v\([0-9]*\)\..*/\1/')
              DESTS="${DESTS} --destination=${REGISTRY}:${MINOR}"
              DESTS="${DESTS} --destination=${REGISTRY}:${MAJOR}"
              DESTS="${DESTS} --destination=${REGISTRY}:latest"
            fi

            # Build from workspace context where binaries were just built
            /kaniko/executor \
              --context=/workspace/src \
              --dockerfile=/workspace/src/Dockerfile \
              --build-arg=VERSION=${VERSION} \
              $DESTS \
              --cache=true \
              --cache-repo=${REGISTRY}/cache \
              --snapshot-mode=redo \
              --use-new-run=true
        volumeMounts:
          - name: docker-config
            mountPath: /kaniko/.docker
          - name: workspace
            mountPath: /workspace

    # ------------------------------------------------------------------ #
    # 3. Helm chart: gh-pages + OCI
    # ------------------------------------------------------------------ #
    - name: helm-publish
      inputs:
        parameters:
          - name: tag
      script:
        image: alpine/helm:latest
        command: [sh]
        source: |
          set -e
          TAG="{{inputs.parameters.tag}}"
          VERSION="${TAG#v}"
          IS_STABLE=$(echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$' && echo true || echo false)

          apk add --no-cache git

          # Clone and checkout the release tag
          git clone https://x-access-token:${GITHUB_TOKEN}@github.com/jedarden/miroir.git /src
          cd /src
          git checkout "$TAG"

          # Package the chart
          helm package charts/miroir --version "$VERSION" --app-version "$VERSION" -d /dist

          # Push chart as OCI to ghcr.io
          echo "$GHCR_TOKEN" | helm registry login ghcr.io -u jedarden --password-stdin
          helm push /dist/miroir-${VERSION}.tgz oci://ghcr.io/jedarden/charts

          # Publish to gh-pages (index.yaml)
          git clone --branch gh-pages \
              https://x-access-token:${GITHUB_TOKEN}@github.com/jedarden/miroir.git /ghpages || \
            (git clone https://x-access-token:${GITHUB_TOKEN}@github.com/jedarden/miroir.git /ghpages && \
             cd /ghpages && git checkout --orphan gh-pages && git rm -rf . && \
             echo "# Miroir Helm Charts" > index.yaml && git add index.yaml && \
             git commit -m "init gh-pages" && git push origin gh-pages && cd /)

          cp /dist/miroir-${VERSION}.tgz /ghpages/
          cd /ghpages
          helm repo index . --url https://jedarden.github.io/miroir
          git add .
          git config user.email "ci@jedarden.com"
          git config user.name "miroir-release-bot"
          git commit -m "Release chart $VERSION"
          git push origin gh-pages
        env:
          - name: GHCR_TOKEN
            valueFrom:
              secretKeyRef:
                name: github-webhook-secret
                key: token
          - name: GITHUB_TOKEN
            valueFrom:
              secretKeyRef:
                name: github-webhook-secret
                key: token

    # ------------------------------------------------------------------ #
    # 5. GitHub release with CHANGELOG notes
    # ------------------------------------------------------------------ #
    - name: create-github-release
      inputs:
        parameters:
          - name: tag
      container:
        image: ghcr.io/cli/cli:2.49.0
        command: [sh, -c]
        args:
          - |
            set -e
            TAG="{{inputs.parameters.tag}}"
            VER="${TAG#v}"

            cd /workspace/src

            # Extract release notes from CHANGELOG.md
            NOTES=$(awk -v ver="$VER" '
              found && /^## \[/ { exit }
              $0 ~ ("^## \\[" ver "\\]") { found=1; next }
              found { print }
            ' CHANGELOG.md)

            if [ -z "$NOTES" ]; then
              NOTES="Release ${TAG}"
            fi

            # Skip if release already exists
            if gh release view "${TAG}" --repo jedarden/miroir >/dev/null 2>&1; then
              echo "Release ${TAG} already exists, skipping."
              exit 0
            fi

            # Pre-release detection
            PRERELEASE_FLAG=""
            if echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+[-+]'; then
              PRERELEASE_FLAG="--prerelease"
            fi

            gh release create "${TAG}" \
              --repo jedarden/miroir \
              --title "miroir ${TAG}" \
              --notes "${NOTES}" \
              ${PRERELEASE_FLAG} \
              --target "$TAG" \
              /workspace/src/miroir-proxy-linux-amd64 \
              /workspace/src/miroir-proxy-linux-amd64.sha256 \
              /workspace/src/miroir-ctl-linux-amd64 \
              /workspace/src/miroir-ctl-linux-amd64.sha256

            echo "Release ${TAG} created successfully."
        env:
          - name: GH_TOKEN
            valueFrom:
              secretKeyRef:
                name: github-webhook-secret
                key: token
        volumeMounts:
          - name: workspace
            mountPath: /workspace
        resources:
          requests:
            cpu: 2000m
            memory: 4Gi
          limits:
            cpu: 4000m
            memory: 8Gi
