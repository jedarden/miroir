---
# ArgoCD Application: miroir (prod) on ardenone-cluster
# Deploy to: jedarden/declarative-config → k8s/ardenone-cluster/miroir/
#
# Prerequisites:
#   - Namespace: miroir (namespace.yml)
#   - ExternalSecret or manual Secret: miroir-keys
#     (keys: masterKey, nodeMasterKey, adminApiKey)
#   - Helm chart published to ghcr.io/jedarden/charts/miroir
#
# This file is the source of truth. Copy to declarative-config for ArgoCD sync.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: miroir-ardenone-cluster
  namespace: argocd
  labels:
    app.kubernetes.io/name: miroir
    app.kubernetes.io/instance: miroir
    app.kubernetes.io/component: application
spec:
  project: default
  source:
    repoURL: ghcr.io/jedarden/charts
    chart: miroir
    targetRevision: 0.1.0
    helm:
      valuesObject:
        miroir:
          replicas: 2
          shards: 64
          replicationFactor: 2
          replicaGroups: 2
          existingSecret: miroir-keys
          logLevel: info
          resources:
            limits:
              cpu: 1000m
              memory: 1Gi
            requests:
              cpu: 250m
              memory: 512Mi
        taskStore:
          backend: redis
          url: redis://miroir-redis.miroir.svc.cluster.local:6379
        meilisearch:
          enabled: true
          replicas: 4
          nodesPerGroup: 2
          persistence:
            enabled: true
            size: 10Gi
          resources:
            limits:
              cpu: 1000m
              memory: 2Gi
            requests:
              cpu: 250m
              memory: 512Mi
        redis:
          enabled: true
        serviceMonitor:
          enabled: true
          interval: 30s
        prometheusRule:
          enabled: true
  destination:
    server: https://k3s-server-a.ardenone.com:6443
    namespace: miroir
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: true
    syncOptions:
      - Validate=true
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - RespectIgnoreDifferences=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 10
