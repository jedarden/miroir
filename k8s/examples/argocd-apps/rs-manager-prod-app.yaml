# ArgoCD Application: Miroir production on rs-manager
# Copy to: jedarden/declarative-config/k8s/rs-manager/miroir/prod/app.yaml
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: miroir-rs-manager-prod
  namespace: argocd
  labels:
    app.kubernetes.io/name: miroir
    app.kubernetes.io/instance: prod
    app.kubernetes.io/component: application
    app.kubernetes.io/part-of: miroir
spec:
  project: default
  source:
    repoURL: https://github.com/jedarden/declarative-config
    targetRevision: HEAD
    path: k8s/rs-manager/miroir/prod
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: miroir
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 10
