# ExternalSecret example for ESO integration
# Copy to jedarden/declarative-config/k8s/<cluster>/miroir/<instance>/external-secret.yaml
# Requires: ClusterSecretStore named "openbao-backend" exists in the cluster
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: miroir-secrets
  namespace: <namespace>
  labels:
    app.kubernetes.io/name: miroir
    app.kubernetes.io/instance: <instance>
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-backend
    kind: ClusterSecretStore
  target:
    name: miroir-secrets
    creationPolicy: Owner
  data:
    - secretKey: masterKey
      remoteRef:
        key: kv/search/miroir
        property: master_key
    - secretKey: nodeMasterKey
      remoteRef:
        key: kv/search/miroir
        property: node_master_key
    - secretKey: adminApiKey
      remoteRef:
        key: kv/search/miroir
        property: admin_api_key
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: meilisearch-secrets
  namespace: <namespace>
  labels:
    app.kubernetes.io/name: miroir
    app.kubernetes.io/instance: <instance>
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-backend
    kind: ClusterSecretStore
  target:
    name: meilisearch-secrets
    creationPolicy: Owner
  data:
    - secretKey: MEILI_MASTER_KEY
      remoteRef:
        key: kv/search/miroir
        property: meilisearch_master_key
