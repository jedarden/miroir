  enabled: false
vector_search:
  enabled: false
ttl:
  enabled: false
tenant_affinity:
  enabled: false
shadow:
  enabled: false
ilm:
  enabled: false
canary_runner:
  enabled: false
explain:
  enabled: false
hpa:
  enabled: false
leader_election:
  enabled: false
