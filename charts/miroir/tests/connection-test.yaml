{{/*
Helm test: verify miroir proxy is healthy
*/}}
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "miroir.fullname" . }}-connection-test"
  labels:
    {{- include "miroir.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  containers:
    - name: curl
      image: curlimages/curl:latest
      command: ["curl", "-f", "http://{{ include "miroir.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local:7700/health"]
  restartPolicy: Never
