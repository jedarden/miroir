# Default values for miroir.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

miroir:
  image:
    repository: ghcr.io/jedarden/miroir
    tag: ""  # Defaults to Chart.appVersion
    pullPolicy: IfNotPresent

  replicas: 1  # dev default: override to 2+ in production (requires taskStore.backend=redis)

  # Sharding configuration
  shards: 64
  replicationFactor: 1  # dev default: override to 2 in production
  replicaGroups: 1  # dev default: override to 2 in production

  # Task store backend (plan §4)
  # IMPORTANT: When replicas > 1, backend MUST be "redis" (enforced by values.schema.json)
  taskStore:
    backend: sqlite  # sqlite | redis
    path: /data/miroir-tasks.db
    url: ""  # for redis: redis://host:6379

  # Admin UI (plan §13.19)
  admin_ui:
    enabled: true
    path: /_miroir/admin
    auth: key  # key | oauth (future) | none (dev only)
    session_ttl_s: 3600
    read_only_mode: false
    allowed_origins: [same-origin]
    cors_allowed_origins: []
    rate_limit:
      per_ip: "10/minute"
      backend: redis  # redis | local (per-pod); redis required when replicas > 1
      redis_key_prefix: "miroir:ratelimit:adminlogin:"
      redis_ttl_s: 60
    theme:
      accent_color: "#2563eb"
      default_mode: auto
    features:
      sandbox: true
      shadow_viewer: true
      cdc_inspector: true

  # Search UI (plan §13.21)
  search_ui:
    enabled: true
    path: /ui/search
    widget_script_enabled: true
    embeddable: true
    auth:
      mode: public  # public | shared_key | oauth_proxy
      shared_key_env: ""
      session_ttl_s: 900
      session_rate_limit: "10/minute"
      jwt_secret_env: SEARCH_UI_JWT_SECRET
      oauth_proxy:
        user_header: X-Forwarded-User
        groups_header: X-Forwarded-Groups
        filter_template: null
        attribute_map:
          groups: groups_array
          user: user_id_string
    allowed_origins: ["*"]
    scoped_key_max_age_days: 60
    scoped_key_rotate_before_expiry_days: 30
    scoped_key_rotation_drain_s: 120
    rate_limit:
      per_ip: "60/minute"
      backend: redis  # redis | local (per-pod); redis required when replicas > 1
      redis_key_prefix: "miroir:ratelimit:searchui:"
      redis_ttl_s: 60
    cors_allowed_origins: []
    csp_overrides:
      script_src: []
      img_src: []
      connect_src: []
    csp: "default-src 'self'; img-src 'self' https:; style-src 'self' 'unsafe-inline'"
    analytics:
      enabled: false
      sink: cdc

  # Scatter policy for unavailable shards
  scatter:
    unavailableShardPolicy: partial  # partial | error

  # Horizontal Pod Autoscaler (plan §14.4)
  hpa:
    enabled: false  # dev default; production: true (requires taskStore.backend=redis)
    # Per-workload-tier defaults (plan §14.7):
    #   ≤ 500 QPS:   min=2, max=3
    #   ≤ 2k QPS:    min=2, max=4
    #   ≤ 5k QPS:    min=4, max=8  (default)
    #   ≤ 20k QPS:   min=8, max=12
    #   ≤ 100k QPS:  min=12, max=24
    minReplicas: 4
    maxReplicas: 8
    # Stabilization windows (plan §14.4): scale-up fast, scale-down slow
    behavior:
      scaleDown:
        stabilizationWindowSeconds: 300
      scaleUp:
        stabilizationWindowSeconds: 30
    # Resource metrics (plan §14.4)
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 75
    # Custom metrics (require prometheus-adapter)
    # Per-pod metric: average requests per pod
    targetRequestsInFlight: 500
    # Global metric: total background jobs queued across all pods
    targetBackgroundQueueDepth: 10

  # Ingress configuration
  ingress:
    enabled: false
    className: "nginx"
    annotations: {}
      # cert-manager.io/cluster-issuer: "letsencrypt-prod"
    hosts:
      - host: search.example.com
        paths:
          - path: /
            pathType: Prefix
    tls: []
    # - secretName: search-tls
    #   hosts:
    #     - search.example.com

  # Resource limits (plan §14.2: 2 vCPU / 3.75 GB per pod)
  resources:
    limits:
      cpu: 2000m
      memory: 3584Mi  # 3.5 GiB (leaves headroom under 3.75 GB node limit, per §14.8)
    requests:
      cpu: 500m
      memory: 1Gi

  # Pod annotations
  podAnnotations: {}

  # Pod security context
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000

  # Container security context
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

  # Service configuration
  service:
    type: ClusterIP
    port: 7700
    annotations: {}

  # Existing secret with keys: masterKey, nodeMasterKey, adminApiKey
  existingSecret: ""

  # CDC (Change Data Capture) configuration (plan §13.13)
  cdc:
    enabled: false
    emit_ttl_deletes: false
    emit_internal_writes: false
    sinks: []
    # Example sink configurations:
    # - type: webhook
    #   url: https://internal/cdc
    #   batch_size: 100
    #   batch_flush_ms: 1000
    #   include_body: false
    #   retry_max_s: 3600
    # - type: nats
    #   url: nats://nats.messaging.svc:4222
    #   subject_prefix: miroir.cdc
    buffer:
      primary: memory           # memory | redis | pvc
      memory_bytes: 67108864    # 64 MiB — fits within §14.2 per-pod budget
      overflow: redis           # redis | pvc | drop
      redis_bytes: 1073741824   # 1 GiB per-pod budget in Redis for overflow
      pvc_size: 10Gi            # Size of PVC when primary or overflow is pvc
      pvc_storage_class: ""     # Empty uses default storage class

# Redis deployment (when taskStore.backend=redis)
redis:
  enabled: false
  image:
    repository: redis
    tag: 7-alpine
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
  persistence:
    enabled: false
    size: 1Gi
    storageClass: ""

# Service account
serviceAccount:
  create: true
  annotations: {}
  name: ""

# ServiceMonitor (plan §10)
serviceMonitor:
  enabled: false  # requires prometheus-operator in cluster
  interval: 30s
  annotations: {}

# PrometheusRule (plan §10 + §14.9)
prometheusRule:
  enabled: false  # requires prometheus-operator in cluster
  annotations: {}
