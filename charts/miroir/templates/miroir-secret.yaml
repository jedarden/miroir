{{/*
Miroir Secret — plan §9 inventory.

All secrets in the inventory have a Helm values.yaml hook here.
Secrets that are CI/CD-only (ghcr_credentials, github_token) are not
included — they live in the iad-ci cluster's namespace.
*/}}
{{- if and .Values.miroir.replicas (not .Values.miroir.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "miroir.fullname" . }}-secret
  labels:
    {{- include "miroir.labels" . | nindent 4 }}
    app.kubernetes.io/component: miroir
type: Opaque
stringData:
  masterKey: {{ .Values.miroir.masterKey | default (randAlphaNum 32) | quote }}
  nodeMasterKey: {{ .Values.miroir.nodeMasterKey | default (randAlphaNum 32) | quote }}
  adminApiKey: {{ .Values.miroir.adminApiKey | default (randAlphaNum 32) | quote }}
  {{- if .Values.miroir.adminSessionSealKey }}
  adminSessionSealKey: {{ .Values.miroir.adminSessionSealKey | quote }}
  {{- else }}
  adminSessionSealKey: {{ randAlphaNum 64 | quote }}
  {{- end }}
  {{- if .Values.miroir.searchUiJwtSecret }}
  searchUiJwtSecret: {{ .Values.miroir.searchUiJwtSecret | quote }}
  {{- else if .Values.search_ui.enabled }}
  searchUiJwtSecret: {{ randAlphaNum 64 | quote }}
  {{- end }}
  {{- if .Values.miroir.searchUiJwtSecretPrevious }}
  searchUiJwtSecretPrevious: {{ .Values.miroir.searchUiJwtSecretPrevious | quote }}
  {{- end }}
  {{- if .Values.miroir.searchUiSharedKey }}
  searchUiSharedKey: {{ .Values.miroir.searchUiSharedKey | quote }}
  {{- end }}
---
{{/*
Meilisearch Secret — plan §9 K8s Secret structure.

Separate from miroir-secrets per the plan. nodeMasterKey is the
admin-scoped API key used by Miroir to talk to Meilisearch nodes.
The Meilisearch startup master key (MEILI_MASTER_KEY) is the same value,
matching the plan's key relationship Model B where the nodeMasterKey
is an admin-scoped child of the startup master key.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "miroir.fullname" . }}-meili-secret
  labels:
    {{- include "miroir.labels" . | nindent 4 }}
    app.kubernetes.io/component: meilisearch
type: Opaque
stringData:
  masterKey: {{ .Values.miroir.nodeMasterKey | default (randAlphaNum 32) | quote }}
{{- end }}
