{{/*
Meilisearch StatefulSet
*/}}
{{- if .Values.meilisearch.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "miroir.fullname" . }}-meili
  labels:
    {{- include "miroir.labels" . | nindent 4 }}
    app.kubernetes.io/component: meilisearch
spec:
  serviceName: {{ include "miroir.fullname" . }}-meili-headless
  replicas: {{ .Values.meilisearch.replicas }}
  selector:
    matchLabels:
      {{- include "miroir.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: meilisearch
  template:
    metadata:
      annotations:
        {{- with .Values.meilisearch.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "miroir.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: meilisearch
        {{- with .Values.meilisearch.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: meilisearch
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
          image: "{{ .Values.meilisearch.image.repository }}:{{ .Values.meilisearch.image.tag }}"
          imagePullPolicy: {{ .Values.meilisearch.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 7700
              protocol: TCP
          env:
            - name: MEILI_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "miroir.secretName" . }}
                  key: nodeMasterKey
            - name: MEILI_ENV
              value: "production"
            {{- with .Values.meilisearch.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: /meili_data
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          resources:
            {{- toYaml .Values.meilisearch.resources | nindent 12 }}
      {{- with .Values.meilisearch.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.meilisearch.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.meilisearch.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.meilisearch.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "miroir.labels" . | nindent 10 }}
          app.kubernetes.io/component: meilisearch
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.meilisearch.persistence.size }}
        {{- if .Values.meilisearch.persistence.storageClass }}
        storageClassName: {{ .Values.meilisearch.persistence.storageClass }}
        {{- end }}
  {{- end }}
{{- end }}
