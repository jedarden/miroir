{{/*
ESO ExternalSecret — plan §6 + §9.

Pulls all Miroir secrets from OpenBao kv/search/miroir via the
openbao-backend ClusterSecretStore. When eso.enabled=true this
template replaces the auto-generated K8s Secret; set
miroir.existingSecret to the output name so the Deployment and
StatefulSet reference the ESO-managed Secret instead.

Least-privilege OpenBao policy (see k8s/openbao-policy.hcl):
  path "kv/data/search/miroir" { capabilities = ["read"] }
  path "kv/metadata/search/miroir" { capabilities = ["read"] }
*/}}
{{- if and .Values.eso.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "miroir.fullname" . }}-eso
  labels:
    {{- include "miroir.labels" . | nindent 4 }}
    app.kubernetes.io/component: miroir-secrets
spec:
  refreshInterval: {{ .Values.eso.refreshInterval | default "15m" }}
  secretStoreRef:
    name: {{ .Values.eso.secretStoreRef.name | default "openbao-backend" }}
    kind: {{ .Values.eso.secretStoreRef.kind | default "ClusterSecretStore" }}
  target:
    name: {{ include "miroir.fullname" . }}-secret
    creationPolicy: Owner
  data:
    # Plan §9 inventory — all entries map 1:1 from OpenBao kv path
    - secretKey: masterKey
      remoteRef:
        key: {{ .Values.eso.secretPath | default "kv/search/miroir" }}
        property: master_key
    - secretKey: nodeMasterKey
      remoteRef:
        key: {{ .Values.eso.secretPath | default "kv/search/miroir" }}
        property: node_master_key
    - secretKey: adminApiKey
      remoteRef:
        key: {{ .Values.eso.secretPath | default "kv/search/miroir" }}
        property: admin_api_key
    - secretKey: adminSessionSealKey
      remoteRef:
        key: {{ .Values.eso.secretPath | default "kv/search/miroir" }}
        property: admin_session_seal_key
    - secretKey: searchUiJwtSecret
      remoteRef:
        key: {{ .Values.eso.secretPath | default "kv/search/miroir" }}
        property: search_ui_jwt_secret
    {{- if .Values.eso.includePreviousJwt }}
    - secretKey: searchUiJwtSecretPrevious
      remoteRef:
        key: {{ .Values.eso.secretPath | default "kv/search/miroir" }}
        property: search_ui_jwt_secret_previous
    {{- end }}
    {{- if .Values.eso.includeSharedKey }}
    - secretKey: searchUiSharedKey
      remoteRef:
        key: {{ .Values.eso.secretPath | default "kv/search/miroir" }}
        property: search_ui_shared_key
    {{- end }}
    {{- if .Values.eso.includeRedisPassword }}
    - secretKey: redis-password
      remoteRef:
        key: {{ .Values.eso.secretPath | default "kv/search/miroir" }}
        property: redis_password
    {{- end }}
---
{{/*
ESO ExternalSecret for Meilisearch node secrets.

Separate Secret following plan §9 K8s Secret structure — Meilisearch
pods read MEILI_MASTER_KEY from this Secret.
*/}}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "miroir.fullname" . }}-meili-eso
  labels:
    {{- include "miroir.labels" . | nindent 4 }}
    app.kubernetes.io/component: meilisearch-secrets
spec:
  refreshInterval: {{ .Values.eso.refreshInterval | default "15m" }}
  secretStoreRef:
    name: {{ .Values.eso.secretStoreRef.name | default "openbao-backend" }}
    kind: {{ .Values.eso.secretStoreRef.kind | default "ClusterSecretStore" }}
  target:
    name: {{ include "miroir.fullname" . }}-meili-secret
    creationPolicy: Owner
  data:
    - secretKey: masterKey
      remoteRef:
        key: {{ .Values.eso.secretPath | default "kv/search/miroir" }}
        property: node_master_key
{{- end }}
